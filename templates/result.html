<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f4f4;
      }

      .navigation-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 64px;
        background-color: #333333 !important;
      }

      .new-logo {
        padding: 0 15px !important;
        display: flex !important;
        height: 100%;
      }

      .new-logo__image {
        width: 100px;
      }

      .login-status {
        display: flex;
        align-items: center;
      }

      .member-icon {
        width: 40px;
      }

      .logout-btn {
        padding: 5px 12px;
        font-size: 16px;
        cursor: pointer;
        color: #ffffff;
        text-decoration: none;
        transition: all 0.5s ease-in-out;
      }

      .logout-btn:hover {
        text-decoration: underline;
      }

      .container {
        width: 100%;
        height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .result-container {
        width: 90%;
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      /* 新增：標題與複製按鈕的容器 */
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }
      h2 {
        color: #333;
        margin: 0;
      }

      /* JSON 顯示區域樣式 */
      #jsonViewer {
        background-color: #282c34;
        color: #abb2bf;
        padding: 20px;
        border-radius: 8px;
        overflow: auto;
        max-height: 500px;
        font-family: "Consolas", "Monaco", monospace;
        font-size: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        border: 1px solid #ddd;
      }

      .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
        gap: 20px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        text-decoration: none;
      }

      /* 複製按鈕樣式 (綠色) */
      .btn-copy {
        background-color: #ff6600;
        color: white;
      }
      .btn-copy:hover {
        background-color: #c24e01;
      }

      .btn-back {
        flex: 1;
        background-color: #6c757d;
        color: white;
        padding: 15px; /* 下方大按鈕維持較大尺寸 */
      }
      .btn-back:hover {
        background-color: #5a6268;
      }

      .btn-download {
        flex: 1;
        background-color: #ff6600;
        color: white;
        padding: 15px;
      }
      .btn-download:hover {
        background-color: #c24e01;
      }
    </style>
  </head>
  <body>
    <header class="pitch minWidth navigation-bar" style="padding-left: 0">
      <a class="new-logo" href="{{ url_for('index') }}">
        <img
          class="new-logo__image"
          src="{{ url_for('static', filename='images/logo.png') }}"
          alt="logo"
        />
      </a>
      <div class="login-status">
        <img
          class="member-icon"
          src="{{ url_for('static', filename='images/member.png') }}"
          alt="member"
        />
        <a class="logout-btn" href="/logout">登出</a>
      </div>
    </header>
    <div class="container">
      <div class="result-container">
        <div class="header-row">
          <h2>產出的 Plexure.json</h2>
          <button id="copyBtn" class="btn btn-copy">複製 JSON</button>
        </div>

        <pre id="jsonViewer">{{ json_content }}</pre>

        <div class="btn-group">
          <a href="/step2" class="btn btn-back">重新產 JSON</a>
          <button id="downloadBtn" class="btn btn-download">
            下載 JSON 檔案
          </button>
        </div>
      </div>
    </div>

    <script>
      // 1. 複製 JSON 的邏輯
      document.getElementById("copyBtn").addEventListener("click", function () {
        const jsonText = document.getElementById("jsonViewer").textContent;

        // 使用現代瀏覽器的 Clipboard API
        navigator.clipboard
          .writeText(jsonText)
          .then(() => {
            const copyBtn = document.getElementById("copyBtn");
            const originalText = copyBtn.textContent;

            // 變更按鈕文字作為回饋
            copyBtn.textContent = "已複製！";
            copyBtn.style.backgroundColor = "#c24e01";

            // 1.5 秒後恢復原狀
            setTimeout(() => {
              copyBtn.textContent = originalText;
              copyBtn.style.backgroundColor = "#ff6600";
            }, 1500);
          })
          .catch((err) => {
            alert("複製失敗: ", err);
          });
      });

      // 2. 下載 JSON 的邏輯
      document
        .getElementById("downloadBtn")
        .addEventListener("click", function () {
          const jsonText = document.getElementById("jsonViewer").textContent;
          const blob = new Blob([jsonText], { type: "application/json" });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = "plexure.json";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        });
    </script>
  </body>
</html>
