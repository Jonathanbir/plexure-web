<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f4f4;
      }

      .navigation-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 64px;
        background-color: #333333 !important;
      }

      .new-logo {
        padding: 0 15px !important;
        display: flex !important;
        height: 100%;
      }

      .new-logo__image {
        width: 100px;
      }

      .login-status {
        display: flex;
        align-items: center;
      }

      .member-icon {
        width: 40px;
      }

      .logout-btn {
        padding: 5px 12px;
        font-size: 16px;
        cursor: pointer;
        color: #ffffff;
        text-decoration: none;
        transition: all 0.5s ease-in-out;
      }

      .logout-btn:hover {
        text-decoration: underline;
      }

      .workspace-container {
        width: 100%;
        height: calc(100vh - 64px);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .workspace {
        width: 600px;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h2 {
        color: #ff6600;
        margin-bottom: 30px;
        font-size: 24px;
      }

      p {
        font-size: 16px;
        margin-top: 0;
        text-align: left;
        color: #888888;
      }

      .upload-group {
        margin-bottom: 25px;
        text-align: left;
      }
      label {
        display: block;
        margin-bottom: 10px;
        color: #666;
        font-size: 14px;
      }
      input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }

      .btn-submit {
        background-color: #ff6600;
        color: white;
        border: none;
        padding: 12px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
        transition: all 0.3s;
      }
      .btn-submit:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      .btn-submit:hover {
        background-color: #e65c00;
        color: #ffffff;
        border: 1px solid #ffffff;
      }

      /* 按鈕列容器 */
      .btn-region {
        display: none;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
      }
      .un-save-btn {
        background-color: #ffffff;
        color: #ff6600;
        border: 1px solid #ff6600;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        flex: 1;
        font-weight: bold;
        transition: all 0.5s ease-in-out;
      }
      .save-btn {
        background-color: #ffffff;
        color: #ff6600;
        border: 1px solid #ff6600;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        flex: 1;
        font-weight: bold;
        transition: all 0.5s ease-in-out;
      }
      .un-save-btn:hover,
      .save-btn:hover {
        background-color: #e65c00;
        color: #ffffff;
        border: 1px solid #ffffff;
      }

      /* 下一步按鈕 */
      .next-step-btn {
        display: none;
        margin-top: 20px;
        background-color: white;
        color: #555555;
        border: 1px solid #555555;
        padding: 12px;
        font-size: 16px;
        border-radius: 6px;
        width: 100%;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.5s ease-in-out;
      }

      .next-step-btn:hover {
        background-color: #cccccc;
        color: #555555;
        border: 1px solid white;
      }

      #statusMsg {
        margin-top: 15px;
        font-size: 14px;
        text-align: center;
        color: #888;
      }

      /* 錯誤邊框樣式 */
      .input-error {
        border: 2px solid #fa4616 !important;
        outline: none; /* 移除藍色外框 */
      }

      /* 錯誤文字樣式 */
      .login-witherror {
        background-color: rgba(230, 0, 0, 0.2);
        background-image: url("/static/images/error-icon.svg");
        background-position: 5px;
        background-repeat: no-repeat;
        padding-left: 25px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <header class="pitch minWidth navigation-bar" style="padding-left: 0">
      <a class="new-logo" href="{{ url_for('index') }}">
        <img
          class="new-logo__image"
          src="{{ url_for('static', filename='images/logo.svg') }}"
          alt="logo"
        />
      </a>
      <div class="login-status">
        <img
          class="member-icon"
          src="{{ url_for('static', filename='images/member.png') }}"
          alt="member"
        />
        <a class="logout-btn" href="/logout">登出</a>
      </div>
    </header>
    <div class="workspace-container">
      <div class="workspace">
        <h2>Plexure 自動化機器人 Step1</h2>
        <p class="login-message" id="RequestUserPass-Message"></p>
        <div class="upload-group">
          <label for="imagePath">圖片路徑</label>
          <input
            type="text"
            id="imagePath"
            placeholder="請輸入圖片存放資料夾路徑"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 6px;
              border: 1px solid #ddd;
              box-sizing: border-box;
            "
            value=""
          />
        </div>
        <div class="upload-group">
          <label for="plexureFile">請選擇檔案 (.xlsm 或 .xlsx)：</label>
          <input type="file" id="plexureFile" accept=".xlsx, .xlsm" />
        </div>

        <button id="runTransform" class="btn-submit">產出自動化表單</button>

        <div class="btn-region">
          <button id="unSaveBtn" class="un-save-btn">尚未存檔</button>
          <button id="saveBtn" class="save-btn">已經存檔</button>
        </div>

        <button id="nextStepBtn" class="next-step-btn">前往下一步</button>

        <div id="statusMsg"></div>
      </div>
    </div>
    <script>
      $(document).ready(function () {
        const imageInput = document.getElementById("imagePath");
        const fileInput = document.getElementById("plexureFile");
        const file = $("#plexureFile")[0].files[0];
        const msgEl = document.getElementById("RequestUserPass-Message");
        const statusMsg = document.getElementById("statusMsg");

        // 監聽圖片路徑輸入框的 input 事件
        document
          .getElementById("imagePath")
          .addEventListener("input", function () {
            var imageInput = this;
            var val = imageInput.value.trim();

            if (val !== "") {
              // 當有輸入內容時，立刻移除錯誤樣式
              imageInput.classList.remove("input-error");
              msgEl.innerText = "";
              msgEl.classList.remove("login-witherror");
            } else {
              // 當內容被刪光時，立刻顯示錯誤樣式
              imageInput.classList.add("input-error");
              msgEl.innerText = "請填圖片路徑";
              msgEl.classList.add("login-witherror");
            }
          });

        // 監聽檔案選擇框
        document
          .getElementById("plexureFile")
          .addEventListener("change", function () {
            var fileInput = this;

            // 判斷是否有選取檔案 (檢查 files 陣列長度)
            if (fileInput.files.length > 0) {
              fileInput.classList.remove("input-error");
              msgEl.innerText = "";
              msgEl.classList.remove("login-witherror");
            } else {
              fileInput.classList.add("input-error");
              msgEl.innerText = "請先選擇原始 plexure.xlsm 檔案！";
              msgEl.classList.add("login-witherror");
            }
          });

        // 1. 點擊產出
        $("#runTransform").click(function () {
          var imageInput = document.getElementById("imagePath");
          var fileInput = document.getElementById("plexureFile");

          var imagePath = imageInput.value.trim();

          // --- 判斷 1：圖片路徑 ---
          if (imagePath === "") {
            imageInput.classList.add("input-error");
            msgEl.innerText = "請填圖片路徑";
            msgEl.classList.add("login-witherror");
            imageInput.focus();
            return;
          }

          // --- 判斷 2：檢查檔案 (關鍵修正) ---
          if (fileInput.files.length === 0) {
            fileInput.classList.add("input-error");
            msgEl.innerText = "請先選擇原始 plexure.xlsm 檔案！";
            msgEl.classList.add("login-witherror");
            // 檔案輸入框無法用 focus() 強制開啟，提示使用者即可
            return;
          }

          // --- 通過防呆，開始準備上傳 ---
          var formData = new FormData();
          formData.append("file", fileInput.files[0]); // 抓取第一個檔案
          formData.append("imagePath", imagePath);

          // 顯示處理中狀態
          $("#runTransform").prop("disabled", true).text("處理中...");
          statusMsg.innerText = "正在讀取檔案並轉換路徑...";
          msgEl.classList.remove("login-witherror");

          $.ajax({
            url: "/transform",
            method: "POST",
            data: formData,
            processData: false,
            contentType: false,
            xhrFields: { responseType: "blob" },
            success: function (blob) {
              // 下載檔案邏輯...
              var link = document.createElement("a");
              link.href = window.URL.createObjectURL(blob);
              link.download = "data.xlsx";
              link.click();

              $("#runTransform").text("再次產出表單").prop("disabled", false);
              $(".btn-region").css("display", "flex");
              statusMsg.innerText = "成功下載！請確認檔案。";
            },
            error: function (xhr) {
              // 處理後端傳回的錯誤
              var errorMsg = "轉換失敗";
              try {
                // 如果後端有傳 JSON 錯誤訊息
                var reader = new FileReader();
                reader.onload = function () {
                  alert("錯誤：" + JSON.parse(reader.result).message);
                };
                reader.readAsText(xhr.responseJSON);
              } catch (e) {
                alert(errorMsg);
              }
              $("#runTransform").prop("disabled", false).text("產出自動化表單");
            },
          });
        });

        // 2. 尚未存檔：重新觸發檔案選擇
        $("#unSaveBtn").click(function () {
          $("#plexureFile").click();
          $("#statusMsg").text("請重新選擇檔案後再次產出。");
        });

        // 3. 已經存檔：顯示下一步
        $("#saveBtn").click(function () {
          $(".btn-region").hide();
          $("#nextStepBtn").show();
          $("#statusMsg").text("存檔確認完成，您可以進入下一步。");
        });

        // 4. 跳轉
        $("#nextStepBtn").click(function () {
          window.location.href = "/step2";
        });
      });
    </script>
  </body>
</html>
