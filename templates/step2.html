<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f4f4;
      }

      p {
        font-size: 16px;
        margin-top: 0;
        text-align: left;
        color: #888888;
      }

      .navigation-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 64px;
        background-color: #333333 !important;
      }

      .new-logo {
        padding: 0 15px !important;
        display: flex !important;
        height: 100%;
      }

      .new-logo__image {
        width: 100px;
      }

      .login-status {
        display: flex;
        align-items: center;
      }

      .member-icon {
        width: 40px;
      }

      .logout-btn {
        padding: 5px 12px;
        font-size: 16px;
        cursor: pointer;
        color: #ffffff;
        text-decoration: none;
        transition: all 0.5s ease-in-out;
      }

      .logout-btn:hover {
        text-decoration: underline;
      }

      .workspace {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        width: 600px;
        height: 400px;
        margin: auto;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h2 {
        color: #ff6600;
        margin-bottom: 30px;
      }

      .upload-group {
        margin-bottom: 20px;
        text-align: left;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
        font-weight: bold;
      }

      input[type="file"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }

      .btn-submit {
        background-color: #ff6600;
        color: white;
        border: none;
        padding: 15px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }

      .btn-submit:hover {
        background-color: #e65c00;
      }

      #statusMsg {
        margin-top: 15px;
        font-size: 14px;
        text-align: center;
        color: #888;
      }

      .input-error {
        border: 2px solid #fa4616 !important;
        outline: none; /* 移除藍色外框 */
      }

      .login-witherror {
        background-color: rgba(230, 0, 0, 0.2);
        background-image: url("/static/images/error-icon.svg");
        background-position: 5px;
        background-repeat: no-repeat;
        padding-left: 25px;
        white-space: nowrap;
      }

      /* 旋轉動畫與進度容器 */
      .loading-content {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 圓圈旋轉效果 */
      .spinner {
        width: 16px;
        height: 16px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s linear infinite;
        margin-left: 8px; /* 圓圈在百分比右邊 */
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* 讓按鈕在處理中稍微變暗 */
      .btn-submit:disabled {
        background-color: #ff9966;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header class="pitch minWidth navigation-bar" style="padding-left: 0">
      <a class="new-logo" href="{{ url_for('index') }}">
        <img
          class="new-logo__image"
          src="{{ url_for('static', filename='images/logo.svg') }}"
          alt="logo"
        />
      </a>
      <div class="login-status">
        <img
          class="member-icon"
          src="{{ url_for('static', filename='images/member.png') }}"
          alt="member"
        />
        <a class="logout-btn" href="/logout">登出</a>
      </div>
    </header>
    <form
      id="jsonForm"
      class="workspace"
      action="/generate_result"
      method="POST"
      enctype="multipart/form-data"
    >
      <h2>Plexure 自動化機器人 Step2</h2>
      <p class="login-message" id="RequestUserPass-Message"></p>
      <div class="upload-section">
        <div class="upload-group">
          <label for="dataFile">1. 上傳資料表 (data.xlsx)</label>
          <input type="file" id="dataFile" name="dataFile" accept=".xlsx" />
        </div>
        <div class="upload-group">
          <label for="modelFile">2. 上傳 modle 樣板 (modle.xlsm)</label>
          <input type="file" id="modelFile" name="modelFile" accept=".xlsm" />
        </div>
      </div>
      <div class="btn-group">
        <button type="button" id="runTransform" class="btn-submit">
          產出最終 JSON
        </button>
      </div>
      <p id="statusMsg" class="login-message"></p>
    </form>

    <script>
      $(document).ready(function () {
        const dataFileInput = document.getElementById("dataFile");
        const modelFileInput = document.getElementById("modelFile");
        const msgEl = document.getElementById("RequestUserPass-Message");
        const statusMsg = document.getElementById("statusMsg");
        const form = document.getElementById("jsonForm");

        dataFileInput.addEventListener("change", function () {
          var fileInput = this;

          // 判斷是否有選取檔案 (檢查 files 陣列長度)
          if (fileInput.files.length > 0) {
            fileInput.classList.remove("input-error");
            msgEl.innerText = "";
            msgEl.classList.remove("login-witherror");
          } else {
            fileInput.classList.add("input-error");
            msgEl.innerText = "請先上傳資料表";
            msgEl.classList.add("login-witherror");
          }
        });

        modelFileInput.addEventListener("change", function () {
          var fileInput = this;

          // 判斷是否有選取檔案 (檢查 files 陣列長度)
          if (fileInput.files.length > 0) {
            fileInput.classList.remove("input-error");
            msgEl.innerText = "";
            msgEl.classList.remove("login-witherror");
          } else {
            fileInput.classList.add("input-error");
            msgEl.innerText = "請先上傳modle樣板";
            msgEl.classList.add("login-witherror");
          }
        });

        $("#runTransform").click(function (e) {
          e.preventDefault();

          // 重置樣式
          dataFileInput.classList.remove("input-error");
          modelFileInput.classList.remove("input-error");
          msgEl.classList.remove("login-witherror");

          // 1. 檢查檔案是否存在
          if (dataFileInput.files.length === 0) {
            dataFileInput.classList.add("input-error");
            msgEl.innerText = "請上傳資料表";
            msgEl.classList.add("login-witherror");
            statusMsg.innerText = "";
            // 檔案輸入框無法用 focus() 強制開啟，提示使用者即可
            return;
          }

          // 檢查 modle.xlsm
          if (modelFileInput.files.length === 0) {
            modelFileInput.classList.add("input-error");
            msgEl.innerText = "請上傳modle樣板";
            msgEl.classList.add("login-witherror");
            statusMsg.innerText = "";
            // 檔案輸入框無法用 focus() 強制開啟，提示使用者即可
            return;
          }

          // 2. 準備上傳資料
          var formData = new FormData(document.getElementById("jsonForm"));
          var btn = $(this);
          let waitTimer;

          btn.prop("disabled", true);

          let tenSecTimer;
          let twoMinTimer;
          let currentAjax;

          // 3. 開始執行 AJAX
          $.ajax({
            url: "/generate_result",
            type: "POST",
            data: formData,
            contentType: false,
            processData: false,
            xhr: function () {
              var xhr = new window.XMLHttpRequest();
              // 監聽上傳進度
              xhr.upload.addEventListener(
                "progress",
                function (evt) {
                  if (evt.lengthComputable) {
                    // 更新按鈕文字：數字 + 旋轉圓圈
                    btn.html(`
                    <div class="loading-content">
                      <div class="spinner"></div>
                    </div>
                  `);
                  }
                },
                false,
              );
              return xhr;
            },
            beforeSend: function () {
              btn.prop("disabled", true);
              msgEl.innerText = "正在傳送檔案並產出 JSON...";
              msgEl.classList.remove("login-witherror");

              // --- 核心邏輯：設定 10 秒計時器 ---
              tenSecTimer = setTimeout(function () {
                statusMsg.innerText = "檔案稍大，處理中請稍候...";
              }, 10000);

              // --- 核心邏輯：設定 120 秒計時器 ---
              twoMinTimer = setTimeout(function () {
                // 1. 取消 AJAX 請求
                if (currentAjax) currentAjax.abort();

                // 2. 恢復按鈕樣式與文字
                btn.prop("disabled", false).text("產出最終 JSON");

                // 3. 修改提示文字
                statusMsg.innerText =
                  "請確認上傳資料是否正確! (處理時間過長已自動停止)";
              }, 120000);
            },
            success: function (response) {
              // --- 成功時：清除計時器 ---
              clearTimeout(tenSecTimer);
              clearTimeout(twoMinTimer);

              document.open();
              document.write(response);
              document.close();
            },
            error: function (xhr, textStatus, errorThrown) {
              // --- 失敗時：一定要清除計時器並恢復按鈕 ---
              clearTimeout(tenSecTimer);
              clearTimeout(twoMinTimer);

              let errorDesc = "轉換失敗，請確認 Excel 內容是否正確。";
              if (textStatus === "timeout") {
                errorDesc = "伺服器處理超時（60秒），請嘗試縮小資料量。";
              }

              statusMsg.innerText = errorDesc;
              btn.prop("disabled", false).text("產出最終 JSON"); // 恢復按鈕文字
              msgEl.innerText = "已停止處理。";
              msgEl.classList.add("login-witherror");
            },
          });
        });
      });
    </script>
  </body>
</html>
