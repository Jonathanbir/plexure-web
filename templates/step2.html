<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f4f4;
      }

      p {
        font-size: 16px;
        margin-top: 0;
        text-align: left;
        color: #888888;
      }

      .navigation-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 64px;
        background-color: #333333 !important;
      }

      .new-logo {
        padding: 0 15px !important;
        display: flex !important;
        height: 100%;
      }

      .new-logo__image {
        width: 100px;
      }

      .login-status {
        display: flex;
        align-items: center;
      }

      .member-icon {
        width: 40px;
      }

      .logout-btn {
        padding: 5px 12px;
        font-size: 16px;
        cursor: pointer;
        color: #ffffff;
        text-decoration: none;
        transition: all 0.5s ease-in-out;
      }

      .logout-btn:hover {
        text-decoration: underline;
      }

      .link-btn-content {
        display: flex;
      }

      .link-btn-content a {
        color: #fff;
        padding: 12px;
        margin-right: 10px;
        border-radius: 6px;
        text-decoration: none;
        transition: all 0.1s ease-in-out;
      }

      .link-btn-content .active {
        background: #888;
      }

      .link-btn-content a:hover {
        background: #888;
      }

      .workspace-container {
        width: 100%;
        height: calc(100vh - 64px);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .workspace {
        width: 600px;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h2 {
        color: #ff6600;
        margin-bottom: 30px;
      }

      .upload-group {
        margin-bottom: 20px;
        text-align: left;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }

      input[type="text"] {
        color: #666;
        font-size: 12px;
        font-weight: 500;
        background: #eee;
      }

      #modelFile {
        width: 100%;
        padding: 10px;
        color: #666;
        font-size: 14px;
        font-weight: 500;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }

      .btn-submit {
        background-color: #ff6600;
        color: white;
        border: none;
        padding: 15px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }

      .btn-submit:hover {
        background-color: #e65c00;
      }

      #statusMsg {
        margin-top: 15px;
        font-size: 14px;
        text-align: center;
        color: #888;
      }

      .input-error {
        border: 2px solid #fa4616 !important;
        outline: none; /* 移除藍色外框 */
      }

      .login-witherror {
        background-color: rgba(230, 0, 0, 0.2);
        background-image: url("/static/images/error-icon.svg");
        background-position: 5px;
        background-repeat: no-repeat;
        padding-left: 25px;
        white-space: nowrap;
      }

      /* 旋轉動畫與進度容器 */
      .loading-content {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 圓圈旋轉效果 */
      .spinner {
        width: 16px;
        height: 16px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s linear infinite;
        margin-left: 8px; /* 圓圈在百分比右邊 */
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* 讓按鈕在處理中稍微變暗 */
      .btn-submit:disabled {
        background-color: #ff9966;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header class="pitch minWidth navigation-bar" style="padding-left: 0">
      <a class="new-logo" href="{{ url_for('index') }}">
        <img
          class="new-logo__image"
          src="{{ url_for('static', filename='images/logo.png') }}"
          alt="logo"
        />
      </a>
      <div class="link-btn-content">
        <a class="active" href="{{ url_for('step2') }}">產出自動化表單</a>
        <a href="{{ url_for('setting') }}">內部設定</a>
      </div>
      <div class="login-status">
        <img
          class="member-icon"
          src="{{ url_for('static', filename='images/member.png') }}"
          alt="member"
        />
        <a class="logout-btn" href="/logout">登出</a>
      </div>
    </header>
    <div class="workspace-container">
      <form
        id="jsonForm"
        class="workspace"
        action="/generate_result"
        method="POST"
        enctype="multipart/form-data"
      >
        <h2>Plexure 自動化機器人 Step2</h2>
        <p class="login-message" id="RequestUserPass-Message"></p>
        <div class="upload-section">
          <div class="upload-group">
            <label>1. 資料表狀態</label>
            <input type="text" value="資料表已就緒" disabled />
          </div>
          <div class="upload-group">
            <label>2. 選擇填單Template </label>
            <select
              id="modelFile"
              name="modelFile"
              style="width: 100%; padding: 10px"
            >
              <option value="">-- 請選擇樣板 --</option>
              {% for model in models %}
              <option value="{{ model }}">
                {% if model == 'Loyalty.xlsm' %} Loyalty Card {% elif model ==
                'Offers.xlsm' %} Offers Card {% else %} {{ model }} {% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="btn-group">
          <button type="button" id="runTransform" class="btn-submit">
            產出最終 JSON
          </button>
        </div>
        <p id="statusMsg" class="login-message"></p>
      </form>
    </div>
    <script>
      $(document).ready(function () {
        const msgEl = document.getElementById("RequestUserPass-Message");
        const btn = $("#runTransform");

        btn.click(function (e) {
          e.preventDefault();

          // 1. 取得選擇的樣板檔名
          const selectedModel = $("#modelFile").val();

          // 2. 檢查是否有選擇
          if (!selectedModel) {
            msgEl.innerText = "請選擇一個填單Template";
            msgEl.classList.add("login-witherror");
            $("#modelFile").addClass("input-error");
            return;
          }

          // 3. 準備資料
          var formData = new FormData();
          formData.append("modelFile", selectedModel);

          // 4. UI 狀態更新
          btn.prop("disabled", true).html(`
                <div class="loading-content">
                    <span>處理中</span>
                    <div class="spinner"></div>
                </div>
            `);
          msgEl.innerText = "正在讀取伺服器資料並轉換 JSON...";
          msgEl.classList.remove("login-witherror");
          $("#modelFile").removeClass("input-error");

          // 5. 執行 AJAX
          $.ajax({
            url: "/generate_result",
            type: "POST",
            data: formData,
            processData: false,
            contentType: false,
            success: function (response) {
              // 成功後直接替換頁面內容顯示結果
              document.open();
              document.write(response);
              document.close();
              history.pushState(null, "", "/result");
            },
            error: function (xhr) {
              alert("轉換失敗，請確認伺服器 excel 資料夾內是否有 data.xlsx");
              btn.prop("disabled", false).text("產出最終 JSON");
              msgEl.innerText = "伺服器處理錯誤";
              msgEl.classList.add("login-witherror");
            },
          });
        });
      });
    </script>
  </body>
</html>
