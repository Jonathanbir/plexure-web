<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f4f4;
      }

      p {
        font-size: 16px;
        margin-top: 0;
        text-align: left;
        color: #888888;
      }

      .navigation-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 64px;
        background-color: #333333 !important;
      }

      .new-logo {
        padding: 0 15px !important;
        display: flex !important;
        height: 100%;
      }

      .new-logo__image {
        width: 100px;
      }

      .login-status {
        display: flex;
        align-items: center;
      }

      .member-icon {
        width: 40px;
      }

      .logout-btn {
        padding: 5px 12px;
        font-size: 16px;
        cursor: pointer;
        color: #ffffff;
        text-decoration: none;
        transition: all 0.5s ease-in-out;
      }

      .logout-btn:hover {
        text-decoration: underline;
      }

      .workspace {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        width: 600px;
        height: 400px;
        margin: auto;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h2 {
        color: #ff6600;
        margin-bottom: 30px;
      }

      .upload-group {
        margin-bottom: 20px;
        text-align: left;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
        font-weight: bold;
      }

      input[type="file"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }

      .btn-submit {
        background-color: #ff6600;
        color: white;
        border: none;
        padding: 15px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }

      .btn-submit:hover {
        background-color: #e65c00;
      }

      #statusMsg {
        margin-top: 15px;
        font-size: 14px;
        text-align: center;
        color: #888;
      }

      .input-error {
        border: 2px solid #fa4616 !important;
        outline: none; /* 移除藍色外框 */
      }

      .login-witherror {
        background-color: rgba(230, 0, 0, 0.2);
        background-image: url("/static/images/error-icon.svg");
        background-position: 5px;
        background-repeat: no-repeat;
        padding-left: 25px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <header class="pitch minWidth navigation-bar" style="padding-left: 0">
      <a class="new-logo" href="{{ url_for('index') }}">
        <img
          class="new-logo__image"
          src="{{ url_for('static', filename='images/logo.svg') }}"
          alt="logo"
        />
      </a>
      <div class="login-status">
        <img
          class="member-icon"
          src="{{ url_for('static', filename='images/member.png') }}"
          alt="member"
        />
        <a class="logout-btn" href="/logout">登出</a>
      </div>
    </header>
    <form
      id="jsonForm"
      class="workspace"
      action="/generate_result"
      method="POST"
      enctype="multipart/form-data"
    >
      <h2>Plexure 自動化機器人 Step2</h2>
      <p class="login-message" id="RequestUserPass-Message"></p>
      <div class="upload-section">
        <div class="upload-group">
          <label for="dataFile">1. 上傳資料表 (data.xlsx)</label>
          <input type="file" id="dataFile" name="dataFile" accept=".xlsx" />
        </div>
        <div class="upload-group">
          <label for="modelFile">2. 上傳 modle 樣板 (modle.xlsm)</label>
          <input type="file" id="modelFile" name="modelFile" accept=".xlsm" />
        </div>
      </div>
      <div class="btn-group">
        <button type="button" id="runTransform" class="btn-submit">
          產出最終 JSON
        </button>
      </div>
      <p id="statusMsg" class="login-message"></p>
    </form>

    <script>
      $(document).ready(function () {
        const dataFileInput = document.getElementById("dataFile");
        const modelFileInput = document.getElementById("modelFile");
        const msgEl = document.getElementById("RequestUserPass-Message");
        const statusMsg = document.getElementById("statusMsg");
        const form = document.getElementById("jsonForm");

        // --- A. 即時監聽：選了檔案就移除紅框 ---
        // [dataFileInput, modelFileInput].forEach((el) => {
        //   el.addEventListener("change", function () {
        //     if (this.files.length > 0) {
        //       this.classList.remove("input-error");
        //       // 如果兩個都選了，就清空錯誤文字
        //       if (
        //         dataFileInput.files.length > 0 &&
        //         modelFileInput.files.length > 0
        //       ) {
        //         msgEl.innerText = "";
        //         msgEl.classList.remove("login-witherror");
        //       }
        //     }
        //   });
        // });

        dataFileInput.addEventListener("change", function () {
          var fileInput = this;

          // 判斷是否有選取檔案 (檢查 files 陣列長度)
          if (fileInput.files.length > 0) {
            fileInput.classList.remove("input-error");
            msgEl.innerText = "";
            msgEl.classList.remove("login-witherror");
          } else {
            fileInput.classList.add("input-error");
            msgEl.innerText = "請先上傳資料表";
            msgEl.classList.add("login-witherror");
          }
        });

        modelFileInput.addEventListener("change", function () {
          var fileInput = this;

          // 判斷是否有選取檔案 (檢查 files 陣列長度)
          if (fileInput.files.length > 0) {
            fileInput.classList.remove("input-error");
            msgEl.innerText = "";
            msgEl.classList.remove("login-witherror");
          } else {
            fileInput.classList.add("input-error");
            msgEl.innerText = "請先上傳modle樣板";
            msgEl.classList.add("login-witherror");
          }
        });

        // --- B. 按鈕點擊：最終防呆檢查 ---
        $("#runTransform").click(function (e) {
          // 【保險 1】阻止瀏覽器任何預設的提交行為
          e.preventDefault();
          let hasError = false;

          // 重置樣式
          dataFileInput.classList.remove("input-error");
          modelFileInput.classList.remove("input-error");
          msgEl.classList.remove("login-witherror");

          // 檢查 data.xlsx
          if (dataFileInput.files.length === 0) {
            dataFileInput.classList.add("input-error");
            msgEl.innerText = "請上傳資料表";
            msgEl.classList.add("login-witherror");
            // 檔案輸入框無法用 focus() 強制開啟，提示使用者即可
            return;
          }

          // 檢查 modle.xlsm
          if (modelFileInput.files.length === 0) {
            modelFileInput.classList.add("input-error");
            msgEl.innerText = "請上傳modle樣板";
            msgEl.classList.add("login-witherror");
            // 檔案輸入框無法用 focus() 強制開啟，提示使用者即可
            return;
          }

          // 通過檢查：改變按鈕狀態並手動提交表單
          $(this).prop("disabled", true).text("處理中...");
          statusMsg.innerText = "正在產出 JSON，請稍候...";
          msgEl.classList.remove("login-witherror");

          // 手動提交表單
          form.submit();
        });
      });
    </script>
  </body>
</html>
