<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f4f4;
      }

      p {
        font-size: 16px;
        margin-top: 0;
        text-align: left;
        color: #888888;
      }

      .navigation-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 64px;
        background-color: #333333 !important;
      }

      .new-logo {
        padding: 0 15px !important;
        display: flex !important;
        height: 100%;
      }

      .new-logo__image {
        width: 100px;
      }

      .login-status {
        display: flex;
        align-items: center;
      }

      .member-icon {
        width: 40px;
      }

      .logout-btn {
        padding: 5px 12px;
        font-size: 16px;
        cursor: pointer;
        color: #ffffff;
        text-decoration: none;
        transition: all 0.5s ease-in-out;
      }

      .logout-btn:hover {
        text-decoration: underline;
      }

      .link-btn-content {
        display: flex;
      }

      .link-btn-content a {
        color: #fff;
        padding: 12px;
        margin-right: 10px;
        border-radius: 6px;
        text-decoration: none;
        transition: all 0.1s ease-in-out;
      }

      .link-btn-content .active {
        background: #888;
      }

      .link-btn-content a:hover {
        background: #888;
      }

      .workspace-container {
        width: 100%;
        height: calc(100vh - 64px);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .workspace {
        width: 600px;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h2 {
        color: #ff6600;
        margin-bottom: 30px;
      }

      .upload-group {
        margin-bottom: 20px;
        text-align: left;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }

      input[type="text"] {
        color: #666;
        font-size: 12px;
        font-weight: 500;
        background: #eee;
      }

      .first-input-content {
        display: flex;
        align-items: center;
      }

      .btn-preview {
        margin-left: 15px;
        margin-bottom: 8px;
        padding: 4px 12px;
        font-size: 13px;
        background-color: #777;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: all 0.1s ease-in-out;
      }

      .btn-preview:hover {
        background-color: #343a40;
      }

      #modelFile {
        width: 100%;
        padding: 10px;
        color: #666;
        font-size: 14px;
        font-weight: 500;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }

      .btn-submit {
        background-color: #ff6600;
        color: white;
        border: none;
        padding: 15px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }

      .btn-submit:hover {
        background-color: #e65c00;
      }

      #statusMsg {
        margin-top: 15px;
        font-size: 14px;
        text-align: center;
        color: #888;
      }

      .input-error {
        border: 2px solid #fa4616 !important;
        outline: none; /* 移除藍色外框 */
      }

      .login-witherror {
        background-color: rgba(230, 0, 0, 0.2);
        background-image: url("/static/images/error-icon.svg");
        background-position: 5px;
        background-repeat: no-repeat;
        padding-left: 25px;
        white-space: nowrap;
      }

      /* 旋轉動畫與進度容器 */
      .loading-content {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 圓圈旋轉效果 */
      .spinner {
        width: 16px;
        height: 16px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s linear infinite;
        margin-left: 8px; /* 圓圈在百分比右邊 */
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* 讓按鈕在處理中稍微變暗 */
      .btn-submit:disabled {
        background-color: #ff9966;
        cursor: not-allowed;
      }

      .font-awesome-flex {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      /* 🎯 幫預視 Excel 表格穿衣服 */
      #excelPreviewContainer table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        font-family: sans-serif;
      }
      #excelPreviewContainer th {
        background-color: #343a40;
        color: white;
        position: sticky; /* 讓表頭死死固定在最上方，往下滾動時欄位名不會消失 */
        top: -20px;
        padding: 10px;
        text-align: center;
        border: 1px solid #454d55;
      }
      #excelPreviewContainer td {
        padding: 8px 10px;
        border: 1px solid #dee2e6;
        max-width: 250px;
        overflow: hidden;
        text-overflow: ellipsis; /* 文字如果太長，自動變千位號 ... 省略 */
        white-space: nowrap;
      }
      #excelPreviewContainer tr:nth-child(even) {
        background-color: #f8f9fa; /* 斑馬線效果，一眼看清單雙行 */
      }
      #excelPreviewContainer tr:hover {
        background-color: #e9ecef; /* 滑鼠滑過去時，整行會亮起來 */
      }

      #excelPreviewModal {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
      }

      .excelPreviewModal-container {
        background-color: #fefefe;
        padding: 20px;
        border: 1px solid #888;
        width: 90%;
        max-width: 1200px;
        height: 80%;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .excelPreviewModal-body {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #dee2e6;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }

      .excelPreviewModal-body h3 {
        margin: 0;
        color: #333;
      }

      #closePreviewModal {
        color: #aaa;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }

      #excelPreviewContainer {
        flex: 1;
        overflow: auto;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <header class="pitch minWidth navigation-bar" style="padding-left: 0">
      <a class="new-logo" href="{{ url_for('index') }}">
        <img
          class="new-logo__image"
          src="{{ url_for('static', filename='images/logo.png') }}"
          alt="logo"
        />
      </a>
      <div class="link-btn-content">
        <a class="active" href="{{ url_for('step2') }}">產出自動化表單</a>
        <a href="{{ url_for('setting') }}">內部設定</a>
      </div>
      <div class="login-status">
        <img
          class="member-icon"
          src="{{ url_for('static', filename='images/member.png') }}"
          alt="member"
        />
        <a class="logout-btn" href="/logout">登出</a>
      </div>
    </header>
    <div class="workspace-container">
      <form
        id="jsonForm"
        class="workspace"
        action="/generate_result"
        method="POST"
        enctype="multipart/form-data"
      >
        <h2>Plexure 自動化機器人 Step2</h2>
        <p class="login-message" id="RequestUserPass-Message"></p>
        <div class="upload-section">
          <div class="upload-group">
            <div class="first-input-content">
              <label>1. 資料表狀態</label>
              <button type="button" id="btnPreviewExcel" class="btn-preview">
                <span class="font-awesome-flex"
                  ><i class="fa-solid fa-eye"></i>預視資料表</span
                >
              </button>
            </div>
            <input type="text" value="資料表已就緒" disabled />
          </div>
          <div class="upload-group">
            <label>2. 選擇填單Template </label>
            <select
              id="modelFile"
              name="modelFile"
              style="width: 100%; padding: 10px"
            >
              <option value="">-- 請選擇樣板 --</option>
              {% for model in models %}
              <option value="{{ model }}">
                {% if model == 'Loyalty.xlsm' %} Loyalty Card {% elif model ==
                'Offers.xlsm' %} Offers Card {% else %} {{ model }} {% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="btn-group">
          <button type="button" id="runTransform" class="btn-submit">
            產出最終 JSON
          </button>
        </div>
        <p id="statusMsg" class="login-message"></p>
      </form>
    </div>
    <div id="excelPreviewModal">
      <div class="excelPreviewModal-container">
        <div class="excelPreviewModal-body">
          <h3 class="font-awesome-flex">
            <i class="fa-solid fa-table"></i>data.xlsx 即時數據預覽
          </h3>
          <span id="closePreviewModal">&times;</span>
        </div>
        <div id="excelPreviewContainer"></div>
      </div>
    </div>
    <script>
      // ====================================================================
      // 🎯 【最新新增】一鍵彈出大魔王資料表預視功能
      // ====================================================================
      var modal = $("#excelPreviewModal");

      // 點擊「🔍 預視資料表」按鈕時發動
      $("#btnPreviewExcel").on("click", function () {
        var btn = $(this);
        var originalText = btn.html();
        btn
          .prop("disabled", true)
          .html(
            "<span class='font-awesome-flex'><i class='fa-solid fa-hourglass-start'></i> 讀取中...</span>",
          );

        $.ajax({
          url: "/api/preview_data",
          type: "GET",
          success: function (res) {
            btn.prop("disabled", false).html(originalText);
            if (res.status === "success") {
              // 把後端封裝好的 HTML 表格直接倒進彈窗容器
              $("#excelPreviewContainer").html(res.data);
              // 把 Modal 的排版模式調整為 flex (顯示出來)
              modal.css("display", "flex");
            } else {
              alert("預覽失敗: " + res.message);
            }
          },
          error: function (xhr) {
            btn.prop("disabled", false).html(originalText);
            alert("伺服器連線失敗，請確認後台執行狀態");
          },
        });
      });

      // 點擊右上角叉叉「&times;」時關閉彈窗
      $("#closePreviewModal").on("click", function () {
        modal.css("display", "none");
      });

      // 點擊彈窗外圍深色陰影區域時，也自動貼心關閉彈窗
      $(window).on("click", function (event) {
        if ($(event.target).is(modal)) {
          modal.css("display", "none");
        }
      });
    </script>
    <script>
      $(document).ready(function () {
        const msgEl = document.getElementById("RequestUserPass-Message");
        const btn = $("#runTransform");

        btn.click(function (e) {
          e.preventDefault();

          // 1. 取得選擇的樣板檔名
          const selectedModel = $("#modelFile").val();

          // 2. 檢查是否有選擇
          if (!selectedModel) {
            msgEl.innerText = "請選擇一個填單Template";
            msgEl.classList.add("login-witherror");
            $("#modelFile").addClass("input-error");
            return;
          }

          // 3. 準備資料
          var formData = new FormData();
          formData.append("modelFile", selectedModel);

          // 4. UI 狀態更新
          btn.prop("disabled", true).html(`
                <div class="loading-content">
                    <span>處理中</span>
                    <div class="spinner"></div>
                </div>
            `);
          msgEl.innerText = "正在讀取伺服器資料並轉換 JSON...";
          msgEl.classList.remove("login-witherror");
          $("#modelFile").removeClass("input-error");

          // 5. 執行 AJAX
          $.ajax({
            url: "/generate_result",
            type: "POST",
            data: formData,
            processData: false,
            contentType: false,
            success: function (response) {
              // 成功後直接替換頁面內容顯示結果
              document.open();
              document.write(response);
              document.close();
              history.pushState(null, "", "/result");
            },
            error: function (xhr) {
              alert("轉換失敗，請確認伺服器 excel 資料夾內是否有 data.xlsx");
              btn.prop("disabled", false).text("產出最終 JSON");
              msgEl.innerText = "伺服器處理錯誤";
              msgEl.classList.add("login-witherror");
            },
          });
        });
      });
    </script>
  </body>
</html>
