<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f4f4;
      }

      p {
        font-size: 16px;
        margin-top: 0;
        text-align: left;
        color: #888888;
      }

      .navigation-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 64px;
        background-color: #333333 !important;
      }

      .new-logo {
        padding: 0 15px !important;
        display: flex !important;
        height: 100%;
      }

      .new-logo__image {
        width: 100px;
      }

      .login-status {
        display: flex;
        align-items: center;
      }

      .member-icon {
        width: 40px;
      }

      .logout-btn {
        padding: 5px 12px;
        font-size: 16px;
        cursor: pointer;
        color: #ffffff;
        text-decoration: none;
        transition: all 0.5s ease-in-out;
      }

      .logout-btn:hover {
        text-decoration: underline;
      }

      .link-btn-content {
        display: flex;
      }

      .link-btn-content a {
        color: #fff;
        padding: 12px;
        margin-right: 10px;
        border-radius: 6px;
        text-decoration: none;
        transition: all 0.1s ease-in-out;
      }

      .link-btn-content .active {
        background: #888;
      }

      .link-btn-content a:hover {
        background: #888;
      }

      .workspace-container {
        width: 100%;
        height: calc(100vh - 64px);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .workspace {
        width: 600px;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h2 {
        color: #ff6600;
        margin-bottom: 30px;
      }

      .upload-group {
        margin-bottom: 20px;
        text-align: left;
      }

      label {
        display: block;
        color: #666;
        font-size: 14px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }

      input[type="text"] {
        color: #666;
        font-size: 12px;
        font-weight: 500;
        background: #eee;
      }

      .first-input-content {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
      }

      .btn-preview {
        margin-left: 15px;
        padding: 4px 12px;
        font-size: 13px;
        background-color: #777;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: all 0.1s ease-in-out;
      }

      .btn-preview:hover {
        background-color: #343a40;
      }

      #modelFile {
        width: 100%;
        padding: 10px;
        color: #666;
        font-size: 14px;
        font-weight: 500;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }

      .btn-submit {
        background-color: #ff6600;
        color: white;
        border: none;
        padding: 15px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }

      .btn-submit:hover {
        background-color: #e65c00;
      }

      #statusMsg {
        margin-top: 15px;
        font-size: 14px;
        text-align: center;
        color: #888;
      }

      .input-error {
        border: 2px solid #fa4616 !important;
        outline: none; /* 移除藍色外框 */
      }

      .login-witherror {
        background-color: rgba(230, 0, 0, 0.2);
        background-image: url("/static/images/error-icon.svg");
        background-position: 5px;
        background-repeat: no-repeat;
        padding-left: 25px;
        white-space: nowrap;
      }

      /* 旋轉動畫與進度容器 */
      .loading-content {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 圓圈旋轉效果 */
      .spinner {
        width: 16px;
        height: 16px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s linear infinite;
        margin-left: 8px; /* 圓圈在百分比右邊 */
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* 讓按鈕在處理中稍微變暗 */
      .btn-submit:disabled {
        background-color: #ff9966;
        cursor: not-allowed;
      }

      .font-awesome-flex {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      /* 🎯 幫預視 Excel 表格穿衣服 */
      #excelPreviewContainer table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        font-family: sans-serif;
      }
      #excelPreviewContainer th {
        background-color: #343a40;
        color: white;
        position: sticky; /* 讓表頭死死固定在最上方，往下滾動時欄位名不會消失 */
        top: -20px;
        z-index: 999;
        padding: 10px;
        text-align: center;
        border: 1px solid #454d55;
      }
      #excelPreviewContainer td {
        padding: 8px 10px;
        border: 1px solid #dee2e6;
        max-width: 250px;
        overflow: hidden;
        text-overflow: ellipsis; /* 文字如果太長，自動變千位號 ... 省略 */
        white-space: nowrap;
      }
      #excelPreviewContainer tr:nth-child(even) {
        background-color: #f8f9fa; /* 斑馬線效果，一眼看清單雙行 */
      }
      #excelPreviewContainer tr:hover {
        background-color: #e9ecef; /* 滑鼠滑過去時，整行會亮起來 */
      }

      #excelPreviewModal {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
      }

      .excelPreviewModal-container {
        background-color: #fefefe;
        padding: 20px;
        border: 1px solid #888;
        width: 90%;
        max-width: 1200px;
        height: 80%;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .excelPreviewModal-body {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #dee2e6;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }

      .excelPreviewModal-body h3 {
        margin: 0;
        color: #333;
      }

      #closePreviewModal {
        color: #aaa;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }

      #excelPreviewContainer {
        flex: 1;
        overflow: auto;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 10px;
      }

      /* 必填欄位漏填時的「爆亮紅框」提醒 */
      #excelPreviewContainer td.empty-required-cell {
        border: 2px solid #dc3545 !important; /* 粗紅框 */
        background-color: #f8d7da !important; /* 淡粉紅背景 */
        position: relative;
      }
      /* 貼心小彩蛋：滑鼠滑過去紅框格時，會出現「此欄必填」的驚嘆號提示 */
      #excelPreviewContainer td.empty-required-cell::after {
        content: "必填未填";
        position: absolute;
        right: 5px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 11px;
        color: #dc3545;
        font-weight: bold;
        background: rgba(255, 255, 255, 0.8);
        padding: 2px 4px;
        border-radius: 3px;
      }

      /* 紅色卡關按鈕的專屬外觀 */
      .btn-danger-submit {
        background-color: #dc3545 !important;
        color: white !important;
        border: 1px solid #bd2130 !important;
        box-shadow: 0 4px 6px rgba(220, 53, 69, 0.2) !important;
      }
      .btn-danger-submit:hover {
        background-color: #c82333 !important;
        cursor: pointer;
      }

      #alertMissingItems,
      #alertMissingModalItems {
        display: none;
        margin-left: 10px;
        color: #dc3545;
        font-weight: bold;
        font-size: 14px;
        align-items: center;
        gap: 4px;
      }

      /* 貼心小動畫：讓右邊的 (表單有未填項目) 警示燈微微閃爍，吸引使用者注意 */
      @keyframes alertBlink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
        100% {
          opacity: 1;
        }
      }
      .alert-missing-text {
        animation: alertBlink 1.5s infinite;
        display: inline-flex;
        align-items: center;
      }
      /* 🎯 最新新增：表頭違規時的爆亮紅字與瘋狂閃爍動畫 */
      #excelPreviewContainer th.header-error-blink {
        color: #ff4d4d; /* 鮮紅色文字 */
        font-weight: 900 !important;
        text-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
        animation: textBlinkRed 0.8s infinite alternate !important; /* 0.8秒來回快速閃爍 */
      }

      @keyframes textBlinkRed {
        0% {
          color: #fff;
        }
        100% {
          color: #ff4d4d;
        }
      }
    </style>
  </head>
  <body>
    <header class="pitch minWidth navigation-bar" style="padding-left: 0">
      <a class="new-logo" href="{{ url_for('index') }}">
        <img
          class="new-logo__image"
          src="{{ url_for('static', filename='images/logo.png') }}"
          alt="logo"
        />
      </a>
      <div class="link-btn-content">
        <a class="active" href="{{ url_for('step2') }}">產出自動化表單</a>
        <a href="{{ url_for('setting') }}">內部設定</a>
      </div>
      <div class="login-status">
        <img
          class="member-icon"
          src="{{ url_for('static', filename='images/member.png') }}"
          alt="member"
        />
        <a class="logout-btn" href="/logout">登出</a>
      </div>
    </header>
    <div class="workspace-container">
      <form
        id="jsonForm"
        class="workspace"
        action="/generate_result"
        method="POST"
        enctype="multipart/form-data"
      >
        <h2>Plexure 自動化機器人 Step2</h2>
        <p class="login-message" id="RequestUserPass-Message"></p>
        <div class="upload-section">
          <div class="upload-group">
            <div class="first-input-content">
              <label>1. 資料表狀態</label>
              <button type="button" id="btnPreviewExcel" class="btn-preview">
                <span class="font-awesome-flex"
                  ><i class="fa-solid fa-eye"></i>預視資料表</span
                >
              </button>
              <span id="alertMissingItems" class="alert-missing-text">
                <i class="fa-solid fa-triangle-exclamation"></i>
                (表單有未填項目)
              </span>
            </div>
            <input type="text" value="資料表已就緒" disabled />
          </div>
          <div class="upload-group">
            <label>2. 選擇填單Template </label>
            <select
              id="modelFile"
              name="modelFile"
              style="width: 100%; padding: 10px"
            >
              <option value="">-- 請選擇樣板 --</option>
              {% for model in models %}
              <option value="{{ model }}">
                {% if model == 'Loyalty.xlsm' %} Loyalty Card {% elif model ==
                'Offers.xlsm' %} Offers Card {% else %} {{ model }} {% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="btn-group">
          <button type="button" id="runTransform" class="btn-submit">
            產出最終 JSON</button
          ><button
            type="button"
            id="backStep1"
            class="btn-submit btn-danger-submit"
            style="display: none"
          >
            請回上一步調整表單
          </button>
        </div>
        <p id="statusMsg" class="login-message"></p>
      </form>
    </div>
    <div id="excelPreviewModal">
      <div class="excelPreviewModal-container">
        <div class="excelPreviewModal-body">
          <h3 class="font-awesome-flex">
            <i class="fa-solid fa-table"></i>data.xlsx 即時數據預覽
            <span id="alertMissingModalItems" class="alert-missing-modal-text">
              <i class="fa-solid fa-triangle-exclamation"></i>
              (表單必填項目:"Title EN", "Desc EN", "Terms EN")
            </span>
          </h3>
          <span id="closePreviewModal">&times;</span>
        </div>
        <div id="excelPreviewContainer"></div>
      </div>
    </div>
    <script>
      $(document).ready(function () {
        var modal = $("#excelPreviewModal");
        var btnPreview = $("#btnPreviewExcel");
        var originalPreviewText = btnPreview.html();

        // 全域暫存，用來儲存經檢查過、上好格子紅框與表頭閃爍的完整表格 HTML 成果
        var cachedCheckedTableHtml = "";

        // ====================================================================
        // 智慧卡關防呆雷達 (主動式載入背景掃描)
        // ====================================================================
        function runGatekeeperCheck() {
          $.ajax({
            url: "/api/preview_data",
            type: "GET",
            success: function (res) {
              if (res.status === "success") {
                // 建立隱形虛擬容器來靜悄悄解析表格
                var tempDiv = $("<div>").html(res.data);

                // 定義核心三大檢查重臣
                var requiredHeaders = ["Title EN", "Desc EN", "Terms EN"];

                // 存放這三個欄位「各自在 Excel 的第幾欄 (Index)」，格式為：{ 'Title EN': 3, 'Desc EN': 5 }
                var headerMap = {};

                // 雷達 A 階段：精準比對並鎖定每一個必填項目的欄位編號
                tempDiv.find("table th").each(function (index) {
                  var headerText = $.trim($(this).text());
                  if (requiredHeaders.indexOf(headerText) !== -1) {
                    headerMap[headerText] = index; // 記錄對位，例如 headerMap['Title EN'] = index
                  }
                });

                // 用來追蹤整張表「有沒有任何地方漏填」的全域錯誤燈
                var hasAnyError = false;

                // 用來分別記錄「Title EN」、「Desc EN」、「Terms EN」各自有沒有犯規空值
                var errorStatusByHeader = {
                  "Title EN": false,
                  "Desc EN": false,
                  "Terms EN": false,
                };

                // 🛰️ 雷達 B 階段：逐列掃描每一格儲存格
                tempDiv.find("table tbody tr").each(function () {
                  var rowCells = $(this).find("td");

                  // 遍歷我們規定的三大欄位
                  $.each(requiredHeaders, function (i, hName) {
                    var colIndex = headerMap[hName];
                    if (colIndex !== undefined) {
                      var targetCell = rowCells.eq(colIndex);
                      var cellText = $.trim(targetCell.text());

                      // 💡 抓到了！如果是空白未填
                      if (cellText.length === 0) {
                        targetCell.addClass("empty-required-cell"); // 格子上粗紅框
                        errorStatusByHeader[hName] = true; // 標記這個大類別犯規了
                        hasAnyError = true; // 觸發總體有錯誤警報
                      }
                    }
                  });
                });

                // 雷達 C 階段：【全新進化】讓犯規的大類別表頭 (Th) 染紅並開始閃爍！
                tempDiv.find("table th").each(function () {
                  var headerText = $.trim($(this).text());
                  // 如果這個表頭名稱屬於三大欄位，且剛剛被標記為有犯規空值
                  if (errorStatusByHeader[headerText] === true) {
                    $(this).addClass("header-error-blink"); // 🎯 穿上紅字閃爍衣服！
                  }
                });

                // 將加工完成（格子紅框 + 表頭閃爍）的完美成品，塞進全域快取
                cachedCheckedTableHtml = tempDiv.html();

                // 🛰️ 雷達 D 階段：網頁一載入，根據 hasAnyError 直接開關紅字與控制按鈕生死
                if (hasAnyError) {
                  $("#alertMissingItems").css("display", "inline-flex"); // 1. 顯示紅字 (表單有未填項目)
                  $("#runTransform").hide(); // 2. 隱藏原本的「產出最終 JSON」
                  $("#backStep1").show(); // 3. 顯示紅色的「請回上一步調整表單」
                } else {
                  $("#alertMissingItems").hide();
                  $("#backStep1").hide();
                  $("#runTransform").show(); // 通過考核，放行顯示產出按鈕
                }
              } else {
                console.error("背景自動防呆掃描失敗: " + res.message);
              }
            },
            error: function (xhr) {
              console.error("背景連線失敗，無法執行自動防呆");
            },
          });
        }

        //【主動式發動機制】網頁一載入就立刻去背景抓漏防呆！
        runGatekeeperCheck();

        // ====================================================================
        // 點擊「預視資料表」按鈕時的作動方式
        // ====================================================================
        btnPreview.on("click", function () {
          // 封裝一個專門用來自動滾動到 Title EN / 錯誤欄位的智慧導航小火箭
          // ====================================================================
          // 【高精度優先級版】智慧火箭導航自動定位
          // ====================================================================
          function scrollToTargetColumn() {
            var targetTh = null;

            // 1. 定義錯誤攔截優先級順序
            var priorityOrder = ["Title EN", "Desc EN", "Terms EN"];

            // 2. 依照順序逐一掃描，誰先犯規閃爍，導航就第一優先鎖定誰！
            $.each(priorityOrder, function (i, hName) {
              $("#excelPreviewContainer table th.header-error-blink").each(
                function () {
                  if ($.trim($(this).text()) === hName) {
                    targetTh = $(this); // 鎖定目標
                    return false; // 找到目標，中斷內層 each 迴圈
                  }
                },
              );
              if (targetTh) return false; // 成功攔截優先級，中斷外層 each 迴圈
            });

            // 3. 發動自動絲滑橫向滾動（只有真的有錯漏、targetTh 存在時才發動！）
            if (targetTh && targetTh.length > 0) {
              var container = $("#excelPreviewContainer");

              // 計算目標 Th 相對於滾動容器左側的精準距離
              var scrollTarget =
                targetTh.position().left + container.scrollLeft() - 180; // -40 留點黃金左邊距

              // 讓 X 軸在 500 毫秒內絲滑平移
              container.animate(
                {
                  scrollLeft: scrollTarget,
                },
                500,
              );
            }
          }

          // 狀況 A：背景早就精準加工好了，0秒瞬間秒開高流暢彈窗！
          if (cachedCheckedTableHtml !== "") {
            $("#excelPreviewContainer").html(cachedCheckedTableHtml);
            modal.css("display", "flex");

            // 彈窗一開，立刻發動自動導航火箭滾動！
            setTimeout(function () {
              scrollToTargetColumn();
            }, 150); // 貼心延遲 150 毫秒，等彈窗動畫完全展開後滾動最穩定
            return;
          }

          // 狀況 B：防呆備用流程（使用者點太快）
          btnPreview
            .prop("disabled", true)
            .html(
              `<span><i class="fa-solid fa-hourglass fa-spin"></i> 讀取中...</span>`,
            );
          $.ajax({
            url: "/api/preview_data",
            type: "GET",
            success: function (res) {
              btnPreview.prop("disabled", false).html(originalPreviewText);
              if (res.status === "success") {
                $("#excelPreviewContainer").html(res.data);
                modal.css("display", "flex");

                // 先補發一次背景掃描
                runGatekeeperCheck();

                // 備用流程同樣發動自動滾動
                setTimeout(function () {
                  scrollToTargetColumn();
                }, 200);
              } else {
                alert("預覽失敗: " + res.message);
              }
            },
            error: function (xhr) {
              btnPreview.prop("disabled", false).html(originalPreviewText);
              alert("伺服器連線失敗");
            },
          });
        });

        // 點擊右上角叉叉關閉彈窗
        $("#closePreviewModal").on("click", function () {
          modal.css("display", "none");
        });

        // 點擊深色陰影外圍貼心關閉彈窗
        $(window).on("click", function (event) {
          if ($(event.target).is(modal)) {
            modal.css("display", "none");
          }
        });

        // ====================================================================
        // 產出最終 JSON 按鈕點擊事件 (原封不動)
        // ====================================================================
        $("#runTransform").click(function () {
          var btn = $(this);
          var msgEl = document.getElementById("RequestUserPass-Message");
          var selectedModel = $("#modelFile").val();

          if (!selectedModel) {
            msgEl.innerText = "請選擇一個填單Template";
            msgEl.classList.add("login-witherror");
            $("#modelFile").addClass("input-error");
            return;
          }

          var formData = new FormData();
          formData.append("modelFile", selectedModel);

          btn.prop("disabled", true).html(`
                <div class="loading-content">
                    <span>處理中</span>
                    <div class="spinner"></div>
                </div>
            `);
          msgEl.innerText = "正在讀取伺服器資料並轉換 JSON...";

    <script>
      $(document).ready(function () {
        const msgEl = document.getElementById("RequestUserPass-Message");
        const btn = $("#runTransform");

        btn.click(function (e) {
          e.preventDefault();

          // 1. 取得選擇的樣板檔名
          const selectedModel = $("#modelFile").val();

          // 2. 檢查是否有選擇
          if (!selectedModel) {
            msgEl.innerText = "請選擇一個填單Template";
            msgEl.classList.add("login-witherror");
            $("#modelFile").addClass("input-error");
            return;
          }

          // 3. 準備資料
          var formData = new FormData();
          formData.append("modelFile", selectedModel);

          // 4. UI 狀態更新
          btn.prop("disabled", true).html(`
                <div class="loading-content">
                    <span>處理中</span>
                    <div class="spinner"></div>
                </div>
            `);
          msgEl.innerText = "正在讀取伺服器資料並轉換 JSON...";
          msgEl.classList.remove("login-witherror");
          $("#modelFile").removeClass("input-error");

          // 5. 執行 AJAX
          $.ajax({
            url: "/generate_result",
            type: "POST",
            data: formData,
            processData: false,
            contentType: false,
            success: function (response) {
              // 成功後直接替換頁面內容顯示結果
              document.open();
              document.write(response);
              document.close();
              history.pushState(null, "", "/result");
            },
            error: function (xhr) {
              alert("轉換失敗，請確認伺服器 excel 資料夾內是否有 data.xlsx");
              btn.prop("disabled", false).text("產出最終 JSON");
              msgEl.innerText = "伺服器處理錯誤";
              msgEl.classList.add("login-witherror");
            },
          });
        });
      });
    </script>
