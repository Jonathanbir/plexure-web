<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <style>
      .login-container {
        display: flex;
        height: 100vh;
      }

      .login-container__left {
        display: flex;
        flex: 1;
        justify-content: center;
        -ms-overflow-style: none;
      }

      .login-content {
        margin: auto;
        width: 350px;
      }

      .login-logo {
        margin: 0 auto 40px auto;
        width: 260px;
      }

      img {
        border: 0;
        -ms-interpolation-mode: bicubic;
      }

      .login-body {
        position: relative;
      }

      form {
        margin: 0;
      }

      input {
        border: 1px solid #979797;
        border-radius: 5px;
        padding: 10px;
        margin-top: 5px;
      }

      .login-steps {
        font-size: 18px;
        height: 300px;
      }

      p {
        font-size: 16px;
        margin-top: 0;
        color: #888888;
      }

      .login-message {
        border-radius: 3px;
        display: block;
        padding: 12px 0 12px 0;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 25px;
      }

      label {
        color: #979797;
        display: block;
      }

      input {
        border: 1px solid #979797;
        border-radius: 5px;
        padding: 10px;
        margin-top: 5px;
      }

      a {
        color: #007aff;
        font-size: 16px;
        text-decoration: none;
      }

      .login-buttons {
        margin-bottom: 20px;
        margin-top: 40px;
        text-align: right;
      }

      button,
      html input[type="button"],
      input[type="reset"],
      input[type="submit"] {
        -webkit-appearance: button;
        cursor: pointer;
      }

      .btn-lg {
        font-size: 19px;
        height: 45px;
        font-weight: normal;
        padding: 11px 40px;
      }

      .btn-primary {
        background-color: #fa4616 !important;
        color: #ffffff !important;
        font-size: 16px;
        font-weight: bold;
        font-style: normal;
        line-height: 1.2;
        padding: 10px 15px;
        border-radius: 5px;
        height: 40px;
        border: 1px solid #fa4616;
        box-shadow: 0 0 5px 0 rgba(0, 0, 0, 0);
        outline: none;
        transition: all 0.2s;
        display: inline-block;
        cursor: pointer;
        font-family: Helvetica, Arial, sans-serif;
      }

      .login-container__right {
        background: url("/static/images/plexure-lion.png");
        background-position: center;
        background-size: cover;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <section class="login-container">
      <div class="login-container__left">
        <div class="login-content">
          <div class="login-logo">
            <img
              src="{{ url_for('static', filename='images/plexure-logo.svg') }}"
              alt="logo"
            />
          </div>
          <div class="login-body">
            <div class="login-loader" style="display: none"></div>

            <form action="/Account/Login" id="loginForm" method="post">
              <input
                name="__RequestVerificationToken"
                type="hidden"
                value="DeI_pJnrJpYOqKpRjptEK3vaIhSvkLNzpsOPKLNiAokJyajA2lXXzzBqTt4tJkyEP4KLhJQu6d_Ov6t2a3rTtqXJ-pM1"
              />
              <div class="login-steps">
                <div
                  class="login-step"
                  id="RequestUserPass"
                  style="display: block"
                >
                  <p>Welcome.</p>
                  <p class="login-message" id="RequestUserPass-Message">
                    Please log in to your account.
                  </p>
                  <div class="form-group">
                    <label for="UserName">Username</label>
                    <input
                      autofocus=""
                      id="Username"
                      name="Username"
                      type="text"
                      value=""
                    />
                  </div>
                  <div class="form-group">
                    <label for="Password">Password</label>
                    <input
                      autocomplete="off"
                      id="Password"
                      name="Password"
                      type="password"
                      value=""
                    />
                  </div>
                  <div class="login-forgotten">
                    <a>Forgotten Password?</a>
                  </div>
                </div>
              </div>
              <div class="login-buttons">
                <input
                  class="btn-primary btn-lg"
                  data-loginstate="201"
                  id="submit-button"
                  onclick="SubmitButtonOnClick()"
                  type="button"
                  value="Log in"
                />
              </div>
              <p>
                Having trouble logging in? Please contact your system
                administrator.
              </p>
            </form>
          </div>
        </div>
      </div>
      <div class="login-container__right"></div>
    </section>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      function SubmitButtonOnClick() {
        var userEl = document.getElementById("Username"); // 這裡改為 Username
        var pwdEl = document.getElementById("Password");

        var user = userEl ? userEl.value.trim() : "";
        var pwd = pwdEl ? pwdEl.value.trim() : "";

        console.log("嘗試登入 - 帳號:", user, "密碼:", pwd);

        if (user === "" || pwd === "") {
          alert("請輸入帳號與密碼");
          return;
        }

        // 執行 AJAX 登入
        fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            username: user,
            password: pwd,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              window.location.href = "/step1";
            } else {
              alert(data.message);
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("連線伺服器失敗");
          });
      }
    </script>
  </body>
</html>
