<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure &ndash; Automation Bot</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/favicon.ico') }}"
    />
    <style>
      .login-container {
        display: flex;
        height: 100vh;
      }

      .login-container__left {
        display: flex;
        flex: 1;
        justify-content: center;
        -ms-overflow-style: none;
      }

      .login-content {
        margin: auto;
        width: 350px;
      }

      .login-logo {
        margin: 0 auto 40px auto;
        width: 260px;
      }

      img {
        border: 0;
        -ms-interpolation-mode: bicubic;
      }

      .login-body {
        position: relative;
      }

      form {
        margin: 0;
      }

      input {
        border: 1px solid #979797;
        border-radius: 5px;
        padding: 10px;
        margin-top: 5px;
      }

      .login-steps {
        font-size: 18px;
        height: 300px;
      }

      p {
        font-size: 16px;
        margin-top: 0;
        color: #888888;
      }

      .login-message {
        border-radius: 3px;
        display: block;
        padding: 12px 0 12px 0;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 25px;
      }

      label {
        color: #979797;
        display: block;
      }

      input {
        border: 1px solid #979797;
        border-radius: 5px;
        padding: 10px;
        margin-top: 5px;
      }

      a {
        color: #007aff;
        font-size: 16px;
        text-decoration: none;
      }

      .login-buttons {
        margin-bottom: 20px;
        margin-top: 40px;
        text-align: right;
      }

      button,
      html input[type="button"],
      input[type="reset"],
      input[type="submit"] {
        -webkit-appearance: button;
        cursor: pointer;
      }

      .btn-lg {
        font-size: 19px;
        height: 45px;
        font-weight: normal;
        padding: 11px 40px;
      }

      .btn-primary {
        background-color: #fa4616 !important;
        color: #ffffff !important;
        font-size: 16px;
        font-weight: bold;
        font-style: normal;
        line-height: 1.2;
        padding: 10px 15px;
        border-radius: 5px;
        height: 40px;
        border: 1px solid #fa4616;
        box-shadow: 0 0 5px 0 rgba(0, 0, 0, 0);
        outline: none;
        transition: all 0.2s;
        display: inline-block;
        cursor: pointer;
        font-family: Helvetica, Arial, sans-serif;
      }

      .login-container__right {
        background: url("/static/images/plexure-lion.png");
        background-position: center;
        background-size: cover;
        flex: 1;
      }

      /* 錯誤邊框樣式 */
      .input-error {
        border: 2px solid #fa4616 !important;
        outline: none; /* 移除藍色外框 */
      }

      /* 錯誤文字樣式 */
      .login-witherror {
        background-color: rgba(230, 0, 0, 0.2);
        background-image: url("/static/images/error-icon.svg");
        background-position: 5px;
        background-repeat: no-repeat;
        padding-left: 25px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <section class="login-container">
      <div class="login-container__left">
        <div class="login-content">
          <div class="login-logo">
            <img
              src="{{ url_for('static', filename='images/plexure-logo.png') }}"
              alt="logo"
            />
          </div>
          <div class="login-body">
            <div class="login-loader" style="display: none"></div>

            <form action="/Account/Login" id="loginForm" method="post">
              <input
                name="__RequestVerificationToken"
                type="hidden"
                value="DeI_pJnrJpYOqKpRjptEK3vaIhSvkLNzpsOPKLNiAokJyajA2lXXzzBqTt4tJkyEP4KLhJQu6d_Ov6t2a3rTtqXJ-pM1"
              />
              <div class="login-steps">
                <div
                  class="login-step"
                  id="RequestUserPass"
                  style="display: block"
                >
                  <p>Welcome.</p>
                  <p class="login-message" id="RequestUserPass-Message">
                    Please log in to your account.
                  </p>
                  <div class="form-group">
                    <label for="UserName">Username</label>
                    <input
                      autofocus=""
                      id="Username"
                      name="Username"
                      type="text"
                      value=""
                    />
                  </div>
                  <div class="form-group">
                    <label for="Password">Password</label>
                    <input
                      autocomplete="off"
                      id="Password"
                      name="Password"
                      type="password"
                      value=""
                    />
                  </div>
                  <div class="login-forgotten">
                    <a>Forgotten Password?</a>
                  </div>
                </div>
              </div>
              <div class="login-buttons">
                <input
                  class="btn-primary btn-lg"
                  data-loginstate="201"
                  id="submit-button"
                  onclick="SubmitButtonOnClick()"
                  type="button"
                  value="Log in"
                />
              </div>
              <p>
                Having trouble logging in? Please contact your system
                administrator.
              </p>
            </form>
          </div>
        </div>
      </div>
      <div class="login-container__right"></div>
    </section>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      // 1. 原本的登入邏輯函式
      function SubmitButtonOnClick() {
        const userEl = document.getElementById("Username");
        const pwdEl = document.getElementById("Password");
        const msgEl = document.getElementById("RequestUserPass-Message");

        // --- 重置狀態：每次點擊前先恢復成原始樣式 ---
        userEl.classList.remove("input-error");
        pwdEl.classList.remove("input-error");
        msgEl.classList.remove("login-witherror");
        msgEl.innerText = "Please log in to your account.";

        const user = userEl.value.trim();
        const pwd = pwdEl.value.trim();

        // --- 第一關：檢查是否為空值 ---
        if (user === "" || pwd === "") {
          // 變更提示文字與顏色
          msgEl.innerText = "Username and password are required fields";
          msgEl.classList.add("login-witherror");

          // 針對空白的欄位加上紅框
          if (user === "") userEl.classList.add("input-error");
          if (pwd === "") pwdEl.classList.add("input-error");

          return;
        }

        // --- 第二關：執行 AJAX 登入 ---
        fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            username: user,
            password: pwd,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              window.location.href = "/step1";
            } else {
              // --- 登入失敗：後端回傳帳密錯誤 ---
              msgEl.innerText = data.message; // 顯示後端傳來的「帳號或密碼錯誤」
              msgEl.classList.add("login-witherror");

              // 通常帳密錯會同時讓兩個欄位都變紅框
              userEl.classList.add("input-error");
              pwdEl.classList.add("input-error");
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("連線伺服器失敗");
          });
      }

      // 2. 新增：監聽鍵盤 Enter 事件
      // 我們監聽整個文件的按鍵，只要焦點在輸入框內按下 Enter 就觸發
      document.addEventListener("keydown", function (event) {
        // 檢查按下的按鍵是否為 Enter (代碼 13 或 key 為 "Enter")
        if (event.key === "Enter" || event.keyCode === 13) {
          // 防止某些瀏覽器的預設行為（例如表單重複提交）
          event.preventDefault();
          // 執行登入函式
          SubmitButtonOnClick();
        }
      });
    </script>
  </body>
</html>
