<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexure JSON 產生器</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .workspace {
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 450px;
      }
      h2 {
        color: #ff6600;
        margin-bottom: 30px;
      }
      .upload-group {
        margin-bottom: 20px;
        text-align: left;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
        font-weight: bold;
      }
      input[type="file"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .btn-submit {
        background-color: #ff6600;
        color: white;
        border: none;
        padding: 15px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }
      .btn-submit:hover {
        background-color: #e65c00;
      }
      #statusMsg {
        margin-top: 15px;
        font-size: 14px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <form
      id="jsonForm"
      class="workspace"
      action="/generate_result"
      method="POST"
      enctype="multipart/form-data"
    >
      <div class="upload-section">
        <div class="upload-group">
          <label for="dataFile">1. 上傳資料表 (data.xlsx)</label>
          <input
            type="file"
            id="dataFile"
            name="dataFile"
            accept=".xlsx"
            required
          />
        </div>
        <div class="upload-group">
          <label for="modelFile">2. 上傳 UI 樣板 (modle.xlsm)</label>
          <input
            type="file"
            id="modelFile"
            name="modelFile"
            accept=".xlsm"
            required
          />
        </div>
      </div>

      <div class="btn-group">
        <button type="submit" id="runTransform" class="btn-submit">
          產出最終 JSON
        </button>
      </div>
    </form>

    <script>
      $(document).ready(function () {
        $("#runTransform").click(function () {
          var dataFile = $("#plexureDataFile")[0].files[0];
          var modelFile = $("#plexureModleFile")[0].files[0];

          if (!dataFile || !modelFile) {
            alert("請確保兩個檔案都已選擇！");
            return;
          }

          var formData = new FormData();
          formData.append("dataFile", dataFile);
          formData.append("modelFile", modelFile);

          // 1. 狀態更新
          $("#runTransform").prop("disabled", true).text("處理中...");
          $("#statusMsg").text("正在處理資料並產出 JSON...");

          // 2. 使用 fetch 取代 $.ajax 避免 200 解析錯誤
          fetch("/transform_to_json", {
            method: "POST",
            body: formData,
          })
            .then((response) => {
              if (!response.ok)
                throw new Error("網路回應不正確，代碼：" + response.status);
              return response.blob();
            })
            .then((blob) => {
              // 3. 下載動作
              var link = document.createElement("a");
              link.href = window.URL.createObjectURL(blob);
              link.download = "plexure.json";
              link.click();

              // 4. 成功後恢復按鈕
              $("#statusMsg").text("轉換成功！JSON 已下載。");
              $("#runTransform").prop("disabled", false).text("產出最終 JSON");
            })
            .catch((error) => {
              console.error("Error:", error);
              alert("轉換失敗！原因：" + error.message);
              $("#statusMsg").text("發生錯誤，請檢查後端日誌。");
              $("#runTransform").prop("disabled", false).text("產出最終 JSON");
            });
        });
      });
    </script>
  </body>
</html>
